# ── TrackLayer Docker Reverse Proxy ────────────────────────────────
#
# Listens on port 80. All traffic enters here:
#   /auth, /assets, /analytics, /tickets, /p/, /l/, /d/, /health
#     → backend:4003  (Node.js API)
#   everything else
#     → frontend:80   (Nginx serving Vite static build)
#
# Because the browser talks to a single origin (port 80), there are
# no cross-origin requests and no CORS headers are needed.
# ───────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── API routes → backend ───────────────────────────────────────
    location ~* ^/(auth|assets|analytics|tickets|health|p|l|d)(/|$) {
        proxy_pass         http://backend:4003;
        proxy_http_version 1.1;

        # WebSocket upgrade (live event stream)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Frontend static → frontend container ──────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
