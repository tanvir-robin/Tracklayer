# docker-compose.yml — TrackLayer
#
# Quick start:
#   cp .env.example .env   # fill in JWT_SECRET at minimum
#   docker compose up -d
#
# Services:
#   nginx      – reverse proxy on port 80 (single entry point)
#   backend    – Node.js API
#   frontend   – Vite build served by Nginx
#   mongo      – MongoDB 7
#   redis      – Redis 7
#   minio      – MinIO S3-compatible storage (console → http://localhost:9001)
#   minio-init – one-time job that creates the storage bucket

services:

  # ── Reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  # ── Backend API ────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Override connection strings to use Docker service names
      MONGO_URL: mongodb://mongo:27017/tracklayer
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # "/" means API calls go to the same host — nginx routes them to backend.
        # Change this only if your API lives on a different domain.
        VITE_API_BASE: ${VITE_API_BASE:-/}
    restart: unless-stopped

  # ── MongoDB ────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO object storage ───────────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO web console (optional, remove to keep it private)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO bucket init (runs once, then exits) ──────────────────────
  minio-init:
    image: minio/mc
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin123};
        mc mb --ignore-existing local/$${MINIO_BUCKET:-tracklayer};
        mc anonymous set download local/$${MINIO_BUCKET:-tracklayer};
        echo 'MinIO bucket ready.';
      "

volumes:
  mongo_data:
  redis_data:
  minio_data:
